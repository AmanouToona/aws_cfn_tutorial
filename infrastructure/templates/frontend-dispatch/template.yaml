AWSTemplateFormatVersion: "2010-09-09"
Description: CloudFormation Frontend Dispatch Stack - Creates CloudFront distribution for frontend

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
  Project:
    Type: String
    Default: aws-cfn-tutorial
  FrontendBucketName:
    Type: String
  FrontendWebAclArn:
    Type: String
    Default: ""
  ApiGatewayDomainName:
    Type: String
    Default: ""
  CloudFrontLogBucketName:
    Type: String

Conditions:
  HasApiGatewayDomainName: !Not [!Equals [!Ref ApiGatewayDomainName, ""]]

Resources:
  FrontendDistribution:
    Type: AWS::CloudFront::Distribution
    Properties:
      DistributionConfig:
        Origins:
          - DomainName: !Sub "${FrontendBucketName}.s3.${AWS::Region}.amazonaws.com"
            Id: FrontendBucketOrigin
            OriginAccessControlId: !Ref FrontendOAC
            S3OriginConfig: {}
          - !If
            - HasApiGatewayDomainName
            - DomainName: !Ref ApiGatewayDomainName
              Id: ApiGatewayOrigin
              CustomOriginConfig:
                OriginProtocolPolicy: https-only
                OriginSSLProtocols:
                  - TLSv1.2
            - !Ref AWS::NoValue
        Enabled: true
        CacheBehaviors:
          - !If
            - HasApiGatewayDomainName
            - PathPattern: prod/*
              TargetOriginId: ApiGatewayOrigin
              ViewerProtocolPolicy: redirect-to-https
              AllowedMethods:
                - GET
                - HEAD
                - OPTIONS
              CachedMethods:
                - GET
                - HEAD
              ForwardedValues:
                QueryString: true
                Headers:
                  - Authorization
                  - Origin
                  - Access-Control-Request-Method
                  - Access-Control-Request-Headers
                Cookies:
                  Forward: none
              MinTTL: 0
              DefaultTTL: 0
              MaxTTL: 0
            - !Ref AWS::NoValue
        DefaultCacheBehavior:
          TargetOriginId: FrontendBucketOrigin
          ViewerProtocolPolicy: redirect-to-https
          AllowedMethods:
            - GET
            - HEAD
          CachedMethods:
            - GET
            - HEAD
          ForwardedValues:
            QueryString: false
            Cookies:
              Forward: none
        DefaultRootObject: index.html
        WebACLId: !Ref FrontendWebAclArn
        Logging:
          Bucket: !Sub "${CloudFrontLogBucketName}.s3.amazonaws.com"
          IncludeCookies: false
          Prefix: !Sub "${Project}-frontend-dispatch/${EnvironmentName}/"

  FrontendOAC:
    Type: AWS::CloudFront::OriginAccessControl
    Properties:
      OriginAccessControlConfig:
        Name: !Sub "${Project}-frontend-oac-${EnvironmentName}"
        Description: OAC for frontend bucket
        OriginAccessControlOriginType: s3
        SigningBehavior: always
        SigningProtocol: sigv4
  FrontendS3BucketPolicy:
    Type: AWS::S3::BucketPolicy
    Properties:
      Bucket: !Ref FrontendBucketName
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: cloudfront.amazonaws.com
            Action: s3:GetObject
            Resource: !Sub "arn:aws:s3:::${FrontendBucketName}/*"
            Condition:
              StringEquals:
                AWS:SourceArn: !Sub "arn:aws:cloudfront::${AWS::AccountId}:distribution/${FrontendDistribution}"

Outputs:
  FrontendURL:
    Description: URL of the CloudFront distribution for the frontend
    Value: !Sub "https://${FrontendDistribution.DomainName}"
