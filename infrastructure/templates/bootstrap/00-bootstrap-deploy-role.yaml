AWSTemplateFormatVersion: "2010-09-09"
Description: Bootstrap deploy role for CLI assume-role

Parameters:
  RoleName:
    Type: String
    Default: aws-cfn-tutorial-bootstrap-deploy-role
  TrustedPrincipalArn:
    Type: String

Resources:
  BootstrapDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              AWS: !Ref TrustedPrincipalArn
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/PowerUserAccess
      Policies:
        - PolicyName: BootstrapIamAccess
          PolicyDocument:
            Version: "2012-10-17"
            Statement:
              - Effect: Allow
                Action:
                  - iam:CreateRole
                  - iam:DeleteRole
                  - iam:AttachRolePolicy
                  - iam:DetachRolePolicy
                  - iam:PutRolePolicy
                  - iam:DeleteRolePolicy
                  - iam:GetRole
                  - iam:TagRole
                  - iam:UntagRole
                  - iam:PassRole
                Resource:
                  - arn:aws:iam::*:role/aws-cfn-tutorial-*
              - Effect: Allow
                Action:
                  - cloudformation:CreateStack
                  - cloudformation:UpdateStack
                  - cloudformation:DeleteStack
                  - cloudformation:DescribeStacks
                  - cloudformation:DescribeStackEvents
                  - cloudformation:GetTemplate
                  - cloudformation:ListStacks
                  - cloudformation:ValidateTemplate
                Resource: "*"

Outputs:
  BootstrapDeployRoleArn:
    Value: !GetAtt BootstrapDeployRole.Arn
