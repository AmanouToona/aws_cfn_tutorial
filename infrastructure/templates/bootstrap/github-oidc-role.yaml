AWSTemplateFormatVersion: "2010-09-09"
Description: GitHub Actions OIDC role for deploying this tutorial stack

Parameters:
  RoleName:
    Type: String
    Default: aws-cfn-tutorial-github-actions-deploy-role
  CreateOidcProvider:
    Type: String
    AllowedValues:
      - "true"
      - "false"
    Default: "false"
    Description: Set true only when the account does not have the GitHub OIDC provider yet.
  GitHubOrg:
    Type: String
  GitHubRepo:
    Type: String
  BranchName:
    Type: String
    Default: main

Conditions:
  ShouldCreateOidcProvider: !Equals [!Ref CreateOidcProvider, "true"]

Resources:
  GitHubOidcProvider:
    Type: AWS::IAM::OIDCProvider
    Condition: ShouldCreateOidcProvider
    Properties:
      Url: https://token.actions.githubusercontent.com
      ClientIdList:
        - sts.amazonaws.com
      ThumbprintList:
        - 6938fd4d98bab03faadb97b34396831e3780aea1

  GitHubActionsDeployRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Ref RoleName
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Federated: !If
                - ShouldCreateOidcProvider
                - !Ref GitHubOidcProvider
                - !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
            Action: sts:AssumeRoleWithWebIdentity
            Condition:
              StringEquals:
                token.actions.githubusercontent.com:aud: sts.amazonaws.com
              StringLike:
                token.actions.githubusercontent.com:sub: !Sub "repo:${GitHubOrg}/${GitHubRepo}:ref:refs/heads/${BranchName}"
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/AdministratorAccess

Outputs:
  GitHubActionsDeployRoleArn:
    Description: Role ARN to configure in GitHub Actions secrets
    Value: !GetAtt GitHubActionsDeployRole.Arn
  OidcProviderArnUsed:
    Description: OIDC provider ARN used by this role trust policy
    Value: !If
      - ShouldCreateOidcProvider
      - !Ref GitHubOidcProvider
      - !Sub "arn:aws:iam::${AWS::AccountId}:oidc-provider/token.actions.githubusercontent.com"
