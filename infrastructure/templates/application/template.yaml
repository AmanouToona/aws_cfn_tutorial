AWSTemplateFormatVersion: "2010-09-09"
Description: Minimal backend stack for Hello API

Parameters:
  EnvironmentName:
    Type: String
    Default: dev
  Project:
    Type: String
    Default: aws-cfn-tutorial
  LambdaCodeS3Bucket:
    Type: String
    Description: S3 bucket that stores Lambda deployment zip
  LambdaCodeS3Key:
    Type: String
    Description: S3 key for Lambda deployment zip
  FrontendCallbackUrl:
    Type: String
    Description: Redirect URL for Cognito Hosted UI callback
  FrontendLogoutUrl:
    Type: String
    Description: Redirect URL after Cognito logout

Resources:
  HelloTable:
    Type: AWS::DynamoDB::Table
    Properties:
      TableName: !Sub "${Project}-hello-${EnvironmentName}"
      AttributeDefinitions:
        - AttributeName: id
          AttributeType: S
      KeySchema:
        - AttributeName: id
          KeyType: HASH
      BillingMode: PAY_PER_REQUEST

  HelloFunctionRole:
    Type: AWS::IAM::Role
    Properties:
      RoleName: !Sub "${Project}-hello-function-role-${EnvironmentName}"
      AssumeRolePolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: lambda.amazonaws.com
            Action: sts:AssumeRole
      ManagedPolicyArns:
        - arn:aws:iam::aws:policy/service-role/AWSLambdaBasicExecutionRole

  HelloFunction:
    Type: AWS::Lambda::Function
    Properties:
      FunctionName: !Sub "${Project}-hello-function-${EnvironmentName}"
      Handler: app.lambda_handler
      Runtime: python3.12
      Role: !GetAtt HelloFunctionRole.Arn
      Timeout: 10
      Code:
        S3Bucket: !Ref LambdaCodeS3Bucket
        S3Key: !Ref LambdaCodeS3Key

  HelloApi:
    Type: AWS::ApiGateway::RestApi
    Properties:
      Name: !Sub "${Project}-hello-api-${EnvironmentName}"
      EndpointConfiguration:
        Types:
          - REGIONAL

  HelloApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref HelloApi
      ParentId: !GetAtt HelloApi.RootResourceId
      PathPart: hello

  SecretApiResource:
    Type: AWS::ApiGateway::Resource
    Properties:
      RestApiId: !Ref HelloApi
      ParentId: !GetAtt HelloApi.RootResourceId
      PathPart: secret

  HelloApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref HelloApi
      ResourceId: !Ref HelloApiResource
      HttpMethod: GET
      AuthorizationType: NONE
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${HelloFunction.Arn}/invocations

  HelloApiCognitoAuthorizer:
    Type: AWS::ApiGateway::Authorizer
    Properties:
      Name: !Sub "${Project}-hello-cognito-authorizer-${EnvironmentName}"
      RestApiId: !Ref HelloApi
      Type: COGNITO_USER_POOLS
      IdentitySource: method.request.header.Authorization
      ProviderARNs:
        - !GetAtt CognitoUserPool.Arn

  SecretApiMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref HelloApi
      ResourceId: !Ref SecretApiResource
      HttpMethod: GET
      AuthorizationType: COGNITO_USER_POOLS
      AuthorizerId: !Ref HelloApiCognitoAuthorizer
      Integration:
        Type: AWS_PROXY
        IntegrationHttpMethod: POST
        Uri: !Sub arn:aws:apigateway:${AWS::Region}:lambda:path/2015-03-31/functions/${HelloFunction.Arn}/invocations

  SecretApiOptionsMethod:
    Type: AWS::ApiGateway::Method
    Properties:
      RestApiId: !Ref HelloApi
      ResourceId: !Ref SecretApiResource
      HttpMethod: OPTIONS
      AuthorizationType: NONE
      Integration:
        Type: MOCK
        RequestTemplates:
          application/json: '{"statusCode": 200}'
        IntegrationResponses:
          - StatusCode: 200
            ResponseParameters:
              method.response.header.Access-Control-Allow-Headers: "'Authorization,Content-Type'"
              method.response.header.Access-Control-Allow-Methods: "'GET,OPTIONS'"
              method.response.header.Access-Control-Allow-Origin: "'*'"
      MethodResponses:
        - StatusCode: 200
          ResponseParameters:
            method.response.header.Access-Control-Allow-Headers: true
            method.response.header.Access-Control-Allow-Methods: true
            method.response.header.Access-Control-Allow-Origin: true

  HelloApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref HelloFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HelloApi}/*/GET/hello

  SecretApiPermission:
    Type: AWS::Lambda::Permission
    Properties:
      Action: lambda:InvokeFunction
      FunctionName: !Ref HelloFunction
      Principal: apigateway.amazonaws.com
      SourceArn: !Sub arn:aws:execute-api:${AWS::Region}:${AWS::AccountId}:${HelloApi}/*/GET/secret

  HelloApiDeployment:
    Type: AWS::ApiGateway::Deployment
    DependsOn:
      - HelloApiMethod
      - SecretApiMethod
      - SecretApiOptionsMethod
    Properties:
      RestApiId: !Ref HelloApi
      StageName: prod

  CognitoUserPool:
    Type: AWS::Cognito::UserPool
    Properties:
      UserPoolName: !Sub "${Project}-cognito-userpool-${EnvironmentName}"
      AutoVerifiedAttributes:
        - email

  CognitoUserPoolClient:
    Type: AWS::Cognito::UserPoolClient
    Properties:
      ClientName: !Sub "${Project}-cognito-userpool-client-${EnvironmentName}"
      UserPoolId: !Ref CognitoUserPool
      AllowedOAuthFlowsUserPoolClient: true
      AllowedOAuthFlows:
        - code
      AllowedOAuthScopes:
        - openid
        - email
        - profile
      CallbackURLs:
        - !Ref FrontendCallbackUrl
      LogoutURLs:
        - !Ref FrontendLogoutUrl
      SupportedIdentityProviders:
        - COGNITO
      GenerateSecret: false

  CognitoUserPoolDomain:
    Type: AWS::Cognito::UserPoolDomain
    Properties:
      Domain: !Sub "auth-${EnvironmentName}-${AWS::AccountId}-${AWS::Region}"
      UserPoolId: !Ref CognitoUserPool

Outputs:
  HelloApiUrl:
    Description: URL of the Hello API
    Value: !Sub "https://${HelloApi}.execute-api.${AWS::Region}.amazonaws.com/prod/hello"
  SecretApiUrl:
    Description: URL of the protected Secret API
    Value: !Sub "https://${HelloApi}.execute-api.${AWS::Region}.amazonaws.com/prod/secret"
  HelloFunctionArn:
    Value: !GetAtt HelloFunction.Arn
  HelloTableName:
    Value: !Ref HelloTable
  UserPoolId:
    Value: !Ref CognitoUserPool
  UserPoolClientId:
    Value: !Ref CognitoUserPoolClient
  CognitoDomain:
    Value: !Ref CognitoUserPoolDomain
  CognitoIssuer:
    Value: !Sub "https://cognito-idp.${AWS::Region}.amazonaws.com/${CognitoUserPool}"
  ApiBaseUrl:
    Value: !Sub "https://${HelloApi}.execute-api.${AWS::Region}.amazonaws.com/prod"
